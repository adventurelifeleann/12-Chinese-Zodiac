<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ni Hao | Chinese Zodiac Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-gold: #c5a059;
            --brand-dark: #1a1a1a;
            --brand-white: #ffffff;
            --text-gray: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--brand-dark);
            color: var(--brand-white);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 450px;
            width: 100%;
            padding: 40px 20px;
            border: 1px solid rgba(197, 160, 89, 0.3); /* 金色細線 */
            background-color: rgba(255, 255, 255, 0.02);
            text-align: center;
            border-radius: 4px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--brand-gold);
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-gray);
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .input-section {
            margin-bottom: 30px;
        }

        input[type="date"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--brand-gold);
            color: var(--brand-white);
            font-size: 18px;
            padding: 10px;
            width: 80%;
            text-align: center;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        button {
            background-color: var(--brand-gold);
            color: var(--brand-dark);
            border: none;
            padding: 15px 40px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--brand-white);
            letter-spacing: 4px;
        }

        #result {
            margin-top: 50px;
            display: none;
            text-align: left;
            border-top: 1px solid rgba(197, 160, 89, 0.2);
            padding-top: 30px;
            animation: fadeIn 0.8s ease;
        }

        .res-row {
            margin-bottom: 25px;
        }

        .label {
            color: var(--brand-gold);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        .val {
            font-size: 20px;
            font-family: 'Playfair Display', serif;
            color: var(--brand-white);
        }

        .element-meaning {
            font-size: 12px;
            color: var(--text-gray);
            font-style: italic;
            margin-top: 4px;
            display: block;
        }

        .personality-desc {
            font-size: 15px;
            line-height: 1.8;
            color: #ccc;
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        footer {
            margin-top: 30px;
            font-size: 10px;
            color: var(--text-gray);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NI HAO</h1>
    <p class="subtitle">Zodiac & Destiny</p>
    
    <div class="input-section">
        <input type="date" id="dob" min="1920-01-01">
        <br>
        <button onclick="reveal()">Discover</button>
    </div>

    <div id="result">
        <div class="res-row">
            <span class="label">Lunar Birthday</span>
            <span id="res-lunar" class="val"></span>
        </div>

        <div class="res-row">
            <span class="label">Chinese Zodiac</span>
            <span id="res-zodiac" class="val"></span>
        </div>

        <div class="res-row">
            <span class="label">Five Elements</span>
            <span id="res-element" class="val"></span>
            <span id="res-element-meaning" class="element-meaning"></span>
        </div>

        <div class="res-row">
            <span class="label">Western Horoscope</span>
            <span id="res-star" class="val"></span>
        </div>

        <div class="res-row">
            <span class="label">Personality Profile</span>
            <p id="res-desc" class="personality-desc"></p>
        </div>
        
        <footer>NI HAO RESTAURANT - LONDON</footer>
    </div>
</div>

<script>
// 生肖數據與描述 (完整保留您的圖片內容)
const zodiacData = {
    "Rat": { title: "Rat (The Wit)", element: "Water", emoji: "🐀", meaning: "Creativity", desc: "Quick-witted, resourceful, charming, versatile, and intelligent. They are the pioneers of the zodiac." },
    "Ox": { title: "Ox (The Reliable)", element: "Earth", emoji: "🐂", meaning: "Stability", desc: "Diligent, strong, dependable, determined, and honest. Known for their patience." },
    "Tiger": { title: "Tiger (The Brave)", element: "Wood", emoji: "🐅", meaning: "Growth", desc: "Brave, confident, adventurous, powerful, full of vigor, and courageous. A natural leader." },
    "Rabbit": { title: "Rabbit (The Elegant)", element: "Wood", emoji: "🐇", meaning: "Growth", desc: "Gentle, elegant, patient, exceptionally refined, peaceful and kind. They have a keen eye for beauty." },
    "Dragon": { title: "Dragon (The Majestic)", element: "Earth", emoji: "🐉", meaning: "Stability", desc: "Powerful, charismatic, naturally gifted, ambitious, legendary, noble and the most vital figure in the zodiac." },
    "Snake": { title: "Snake (The Enigmatic)", element: "Fire", emoji: "🐍", meaning: "Passion", desc: "Wise, enigmatic, deeply intuitive, mysterious, graceful, and deep thinkers." },
    "Horse": { title: "Horse (The Energetic)", element: "Fire", emoji: "🐎", meaning: "Passion", desc: "Energetic, free-spirited, independent, and always chasing progress." },
    "Goat": { title: "Goat (The Harmonious)", element: "Earth", emoji: "🐐", meaning: "Stability", desc: "Creative, resilient, gentle, peace-loving, mild-mannered, and appreciative of the finer things." },
    "Monkey": { title: "Monkey (The Playful)", element: "Metal", emoji: "🐒", meaning: "Ambition", desc: "Playful, clever, innovative, mischievously fun, quick-witted, and full of curiosity." },
    "Rooster": { title: "Rooster (The Radiant)", element: "Metal", emoji: "🐓", meaning: "Ambition", desc: "Hardworking, observant, courageous, punctual, and loves to stand out." },
    "Dog": { title: "Dog (The Loyal)", element: "Earth", emoji: "🐕", meaning: "Stability", desc: "Honest, loyal, kind, faithful, fiercely protective, and reliable. Always ready to help others." },
    "Pig": { title: "Pig (The Joyful)", element: "Water", emoji: "🐖", meaning: "Creativity", desc: "Compassionate, generous, happy, easygoing, genuine, and joyful. They bring happiness to everyone." }
};

const animals = ["Rat", "Ox", "Tiger", "Rabbit", "Dragon", "Snake", "Horse", "Goat", "Monkey", "Rooster", "Dog", "Pig"];

function getHoroscope(m, d) {
    const signs = ["Capricorn", "Aquarius", "Pisces", "Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius"];
    const dates = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22];
    return d >= dates[m-1] ? signs[m%12] : signs[m-1];
}

function reveal() {
    const val = document.getElementById('dob').value;
    if(!val) return;
    
    const d = new Date(val);
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const day = d.getDate();

    // 簡單農曆日期轉換顯示（英國客人最感興趣的是年份對應的生肖）
    // 這裡我們標記農曆年份，並告知由於計算複雜，以出生年為主
    document.getElementById('res-lunar').innerText = `Lunar Year of the ${animals[(y-4)%12]}`;

    // 生肖計算 (考慮 1/2 月份的農曆跨年調整)
    let zIdx = (y - 4) % 12;
    if (m < 2) zIdx = (zIdx - 1 + 12) % 12; 
    const key = animals[zIdx];
    const info = zodiacData[key];

    document.getElementById('res-zodiac').innerText = `${info.emoji} ${info.title}`;
    document.getElementById('res-element').innerText = info.element;
    document.getElementById('res-element-meaning').innerText = `(${info.meaning})`;
    document.getElementById('res-star').innerText = getHoroscope(m, day);
    document.getElementById('res-desc').innerText = info.desc;
    
    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>

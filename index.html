<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinese Zodiac | NI HAO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b59b58;
            --dark-green: #111d1a;
            --dark-box: #0a1311;
            --text-light: #e0e0e0;
            --border: #3a4744;
        }

        body {
            background-color: var(--dark-green);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
        }

        header { padding: 40px 10px; width: 100%; text-align: center; }
        .logo-container {
            max-width: 500px; margin: 0 auto; border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold); padding: 15px 0;
            display: flex; justify-content: center; align-items: center; gap: 15px;
        }
        .logo-text { font-family: 'Cinzel', serif; font-size: 2rem; letter-spacing: 8px; color: var(--gold); margin: 0; }
        .logo-cn { font-size: 1.1rem; color: #5b6e6a; }

        .container {
            width: 92%; max-width: 600px; background: var(--dark-box); 
            padding: 40px 20px; border-radius: 4px; border: 1px solid var(--border);
            text-align: center; margin-bottom: 60px;
        }

        h1.main-title { font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 30px; line-height: 1.8; }
        
        /* 修正標題與輸入框間距 */
        .input-group { margin-top: 25px; }
        label { display: block; margin-bottom: 25px; color: #aaa; letter-spacing: 1px; }

        input[type="date"] {
            background: transparent; border: 1px solid var(--border); color: white;
            padding: 15px; width: 100%; max-width: 320px; font-size: 1.1rem;
            border-radius: 0; font-family: 'Montserrat', sans-serif;
        }

        .reveal-btn {
            background: var(--gold); color: var(--dark-green); border: none;
            padding: 18px; width: 100%; max-width: 320px; margin-top: 25px;
            font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer;
        }

        #result { display: none; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 40px; text-align: left; }

        /* 圖片視覺效果：絕對會顯示的 SVG 樣式 */
        .zodiac-svg-box { text-align: center; margin-bottom: 35px; }
        .zodiac-icon { width: 160px; height: 160px; fill: var(--gold); filter: drop-shadow(0 0 10px rgba(181, 155, 88, 0.4)); }

        .result-item { margin-bottom: 25px; }
        .label-gold { color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.95rem; display: block; margin-bottom: 5px; }
        .value-text { font-size: 1.3rem; color: #fff; }

        .profile-box { background: rgba(181, 155, 88, 0.06); padding: 25px; border-left: 4px solid var(--gold); line-height: 1.8; margin-top: 30px; }

        footer { width: 100%; padding: 50px 20px; background: #080f0e; border-top: 1px solid var(--border); text-align: center; box-sizing: border-box; }
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: 0 auto; }
        .footer-col b { color: var(--gold); display: block; margin-bottom: 8px; font-family: 'Cinzel', serif; }
        .footer-col p { color: #aaa; font-size: 0.85rem; margin: 0; }

        @media (max-width: 600px) { .footer-grid { grid-template-columns: 1fr; } }
    </style>
</head>

        const order = ["Rat", "Ox", "Tiger", "Rabbit", "Dragon", "Snake", "Horse", "Goat", "Monkey", "Rooster", "Dog", "Pig"];

        function revealZodiac() {
            const val = document.getElementById('birthday').value;
            if (!val) return;
            const date = new Date(val);
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            const d = date.getDate();

            let idx = (y - 1924) % 12;
            if (idx < 0) idx += 12;
            if (m < 2 || (m === 2 && d < 10)) idx = (idx - 1 + 12) % 12;

            const sign = order[idx];
            const data = profiles[sign];

            document.getElementById('zodiacIcon').innerHTML = `<svg class="zodiac-icon" viewBox="0 0 24 24">${paths[sign]}</svg>`;
            document.getElementById('resZodiac').innerText = sign;
            document.getElementById('resElement').innerText = data.element;
            document.getElementById('resSpirit').innerText = data.spirit;
            document.getElementById('resProfile').innerText = data.text;

            document.getElementById('result').style.display = 'block';
            window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
        }

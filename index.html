<script>

 */
const LUNAR_CALENDAR = [
    0x0a4b0, 0x0d4a0, 0x0da50, 0x05aa0, 0x056a0, 0x0aad0, 0x025d0, 0x092d0, 0x0c950, 0x0a950, // 1920-1929
    0x0b4a0, 0x0b550, 0x0ad50, 0x055a0, 0x04ba0, 0x0a5b0, 0x052b0, 0x0a930, 0x074a0, 0x06aa0, // 1930-1939

    0x04970, 0x0a4b0, 0x0b4b0, 0x06a50, 0x06d40, 0x0ab50, 0x02b60, 0x09570, 0x052f0, 0x04970, // 1950-1959
    0x06560, 0x0d4a0, 0x0ea50, 0x06e90, 0x05ad0, 0x02b60, 0x086e0, 0x092e0, 0x0c8d0, 0x0a950, // 1960-1969
    0x0d4a0, 0x0da50, 0x07550, 0x056a0, 0x0abb0, 0x025d0, 0x092d0, 0x0cab0, 0x0a950, 0x0b4a0, // 1970-1979
    0x0baa0, 0x0ad50, 0x055d0, 0x04ba0, 0x0a5b0, 0x05170, 0x0a930, 0x07c80, 0x06aa0, 0x0ad50, // 1980-1989
    0x04ae0, 0x0a560, 0x0a4d0, 0x0d260, 0x0d950, 0x05aa0, 0x056a0, 0x096d0, 0x04ae0, 0x0a4d0, // 1990-1999
    0x0d250, 0x0d4a0, 0x0da50, 0x05aa0, 0x056a0, 0x0a9d0, 0x052d0, 0x0a950, 0x0b4a0, 0x0b550, // 2000-2009
    0x0ad50, 0x055a0, 0x04ba0, 0x0a5b0, 0x052b0, 0x0a930, 0x074a0, 0x06950, 0x0ad50, 0x04ae0, // 2010-2019
    0x0a4e0, 0x0a4d0, 0x0d250, 0x0d920, 0x0d550, 0x05aa0, 0x0ada0, 0x095d0, 0x04970, 0x0a4b0, // 2020-2029
    0x0b4b0, 0x06a50, 0x06d40, 0x0ab50, 0x02b60, 0x09570  // 2030-2035
];

const zodiacData = {
    "Rat": { title: "Rat (The Wit)", element: "Water", emoji: "🐀", meaning: "Creativity", desc: "Quick-witted, resourceful, charming, versatile, and intelligent. They are the pioneers of the zodiac." },

    "Rabbit": { title: "Rabbit (The Elegant)", element: "Wood", emoji: "🐇", meaning: "Growth", desc: "Gentle, elegant, patient, exceptionally refined, peaceful and kind. They have a keen eye for beauty." },
    "Dragon": { title: "Dragon (The Majestic)", element: "Earth", emoji: "🐉", meaning: "Stability", desc: "Powerful, charismatic, naturally gifted, ambitious, legendary, noble and the most vital figure in the zodiac." },

    "Monkey": { title: "Monkey (The Playful)", element: "Metal", emoji: "🐒", meaning: "Ambition", desc: "Playful, clever, innovative, mischievously fun, quick-witted, and full of curiosity." },
    "Rooster": { title: "Rooster (The Radiant)", element: "Metal", emoji: "🐓", meaning: "Ambition", desc: "Hardworking, observant, courageous, punctual, and loves to stand out." },
    "Dog": { title: "Dog (The Loyal)", element: "Earth", emoji: "🐕", meaning: "Stability", desc: "Honest, loyal, kind, faithful, fiercely protective, and reliable. Always ready to help others." },
    "Pig": { title: "Pig (The Joyful)", element: "Water", emoji: "🐖", meaning: "Creativity", desc: "Compassionate, generous, happy, easygoing, genuine, and joyful. They bring happiness to everyone." }
};

const animals = ["Rat", "Ox", "Tiger", "Rabbit", "Dragon", "Snake", "Horse", "Goat", "Monkey", "Rooster", "Dog", "Pig"];

function getLunar(date) {
    const baseDate = new Date(1920, 1, 20); // 1920年春節
    let offset = Math.floor((date.getTime() - baseDate.getTime()) / 86400000);
    
    let year, month, day;
    for (year = 1920; year <= 2035 && offset > 0; year++) {
        let yDays = getYearDays(year);
        if (offset < yDays) break;
        offset -= yDays;
    }

    let leapMonth = LUNAR_CALENDAR[year-1920] & 0xf;
    let isLeap = false;

    for (month = 1; month <= 12; month++) {
        let mDays = (LUNAR_CALENDAR[year-1920] & (0x10000 >> month)) ? 30 : 29;
        if (offset < mDays) break;
        offset -= mDays;

        if (month === leapMonth && !isLeap) {
            isLeap = true; month--; 
        } else if (isLeap) { isLeap = false; }
    }
    day = offset + 1;
    return { y: year, m: month, d: day };
}

function getYearDays(y) {
    let sum = 348;
    for (let i = 0x8000; i > 0x8; i >>= 1) sum += (LUNAR_CALENDAR[y-1920] & i) ? 1 : 0;
    return sum;
}

function reveal() {
    const val = document.getElementById('dob').value;
    if(!val) return;
    const d = new Date(val);
    const lunar = getLunar(d);

    const monthNames = ["1st Moon", "2nd Moon", "3rd Moon", "4th Moon", "5th Moon", "6th Moon", "7th Moon", "8th Moon", "9th Moon", "10th Moon", "11th Moon", "12th Moon"];
    document.getElementById('res-lunar').innerText = `${monthNames[lunar.m-1]}, Day ${lunar.d} (${lunar.y})`;

    const key = animals[(lunar.y - 4) % 12];
    const info = zodiacData[key];

    document.getElementById('res-zodiac').innerText = `${info.emoji} ${info.title}`;
    document.getElementById('res-element').innerText = info.element;
    document.getElementById('res-element-meaning').innerText = `(${info.meaning})`;
    
    const signs = ["Capricorn", "Aquarius", "Pisces", "Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius"];
    const dates = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22];
    document.getElementById('res-star').innerText = (d.getDate() >= dates[d.getMonth()]) ? signs[(d.getMonth()+1)%12] : signs[d.getMonth()];
    
    document.getElementById('res-desc').innerText = info.desc;
    document.getElementById('result').style.display = 'block';
}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ni Hao | Chinese Zodiac Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-gold: #c5a059;
            --brand-dark: #1a1a1a;
            --brand-white: #ffffff;
            --text-gray: #888888;
            --hanzi-gray: #4d4d4d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--brand-dark);
            color: var(--brand-white);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 50px 25px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            background-color: rgba(255, 255, 255, 0.01);
            text-align: center;
            box-sizing: border-box;
        }

        /* 修正後的 LOGO - 解決重疊問題 */
        .header-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
            font-family: 'Playfair Display', serif;
            color: var(--brand-gold);
            text-transform: uppercase;
        }

        .logo-txt { font-size: 36px; letter-spacing: 4px; }
        .v-bar { width: 1.5px; height: 35px; background-color: var(--brand-gold); margin: 0 15px; }
        .hanzi { color: var(--hanzi-gray); font-size: 22px; margin: 0 10px; font-family: serif; white-space: nowrap; }

        .subtitle {
            font-size: 13px;
            color: var(--text-gray);
            letter-spacing: 3px;
            margin-bottom: 45px;
            text-transform: uppercase;
        }

        /* 強制全英文日期欄位樣式 */
        .input-wrapper { position: relative; width: 85%; margin: 0 auto; }
        .date-label {
            display: block;
            color: var(--brand-gold);
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        input[type="date"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--brand-gold);
            color: var(--brand-white);
            font-size: 18px;
            padding: 10px;
            width: 100%;
            text-align: center;
            outline: none;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
        }

        /* 隱藏原生瀏覽器的中文提示 (Webkit) */
        input[type="date"]::-webkit-datetime-edit-year-field,
        input[type="date"]::-webkit-datetime-edit-month-field,
        input[type="date"]::-webkit-datetime-edit-day-field,
        input[type="date"]::-webkit-datetime-edit-text {
            color: var(--brand-white);
        }

        button {
            background-color: transparent;
            color: var(--brand-gold);
            border: 1px solid var(--brand-gold);
            padding: 15px 45px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 35px;
            transition: 0.3s;
        }

        button:hover { background-color: var(--brand-gold); color: var(--brand-dark); }

        #result { margin-top: 50px; display: none; text-align: left; border-top: 1px solid rgba(197,160,89,0.1); padding-top: 40px; }
        .res-row { margin-bottom: 25px; }
        .label { color: var(--brand-gold); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .val { font-size: 22px; font-family: 'Playfair Display', serif; }
        .element-meaning { font-size: 12px; color: var(--text-gray); font-style: italic; margin-top: 4px; display: block; }
        .desc { font-size: 15px; line-height: 1.8; color: #ccc; margin-top: 10px; }

        .ni-hao-footer {
            margin-top: 50px;
            border-top: 1px solid rgba(197,160,89,0.1);
            padding-top: 30px;
            font-size: 11px;
            color: var(--text-gray);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }
        .footer-logo { grid-column: 1 / -1; text-align: center; font-family: 'Playfair Display', serif; font-size: 14px; color: #fff; margin-bottom: 20px; letter-spacing: 2px; }
        .ni-hao-footer strong { color: var(--brand-gold); display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <span class="logo-txt">N I</span>
        <span class="v-bar"></span>
        <span class="hanzi">你好</span>
        <span class="logo-txt">H A O</span>
    </div>
    <p class="subtitle">Zodiac & Destiny</p>
    
    <div class="input-wrapper">
        <span class="date-label">Enter Date of Birth</span>
        <input type="date" id="dob" min="1920-01-01" max="2035-12-31">
        <button onclick="reveal()">Discover</button>
    </div>

    <div id="result">
        <div class="res-row"><span class="label">Lunar Birthday</span><span id="res-lunar" class="val"></span></div>
        <div class="res-row"><span class="label">Chinese Zodiac</span><span id="res-zodiac" class="val"></span></div>
        <div class="res-row"><span class="label">Five Elements</span><span id="res-element" class="val"></span><span id="res-element-meaning" class="element-meaning"></span></div>
        <div class="res-row"><span class="label">Personality Profile</span><p id="res-desc" class="desc"></p></div>
        
        <div class="ni-hao-footer">
            <div class="footer-logo">NI HAO RESTAURANT - POOLE</div>
            <div><strong>Contact</strong>TEL 01202 611622<br>hello@ni-hao.life</div>
            <div><strong>Location</strong>89 Commercial Road,<br>BH14 0JD</div>
        </div>
    </div>
</div>

<script>
/** 精確農曆引擎 1920-2035 **/
const LUNAR_DATA = [
    0x0a4b0,0x0d4a0,0x0da50,0x05aa0,0x056a0,0x0aad0,0x025d0,0x092d0,0x0c950,0x0a950, // 1920
    0x0b4a0,0x0b550,0x0ad50,0x055a0,0x04ba0,0x0a5b0,0x052b0,0x0a930,0x074a0,0x06aa0, // 1930
    0x0ad50,0x04ae0,0x0a4e0,0x0a4d0,0x0d250,0x0d920,0x0d550,0x05aa0,0x0ada0,0x095d0, // 1940
    0x04970,0x0a4b0,0x0b4b0,0x06a50,0x06d40,0x0ab50,0x02b60,0x09570,0x052f0,0x04970, // 1950
    0x06560,0x0d4a0,0x0ea50,0x06e90,0x05ad0,0x02b60,0x086e0,0x092e0,0x0c8d0,0x0a950, // 1960
    0x0d4a0,0x0da50,0x07550,0x056a0,0x0abb0,0x025d0,0x092d0,0x0cab0,0x0a950,0x0b4a0, // 1970
    0x0baa0,0x0ad50,0x055d0,0x04ba0,0x0a5b0,0x05170,0x0a930,0x07c80,0x06aa0,0x0ad50, // 1980
    0x04ae0,0x0a560,0x0a4d0,0x0d260,0x0d950,0x05aa0,0x056a0,0x096d0,0x04ae0,0x0a4d0, // 1990
    0x0d250,0x0d4a0,0x0da50,0x05aa0,0x056a0,0x0a9d0,0x052d0,0x0a950,0x0b4a0,0x0b550, // 2000
    0x0ad50,0x055a0,0x04ba0,0x0a5b0,0x052b0,0x0a930,0x074a0,0x06950,0x0ad50,0x04ae0, // 2010
    0x0a4e0,0x0a4d0,0x0d250,0x0d920,0x0d550,0x05aa0,0x0ada0,0x095d0,0x04970,0x0a4b0, // 2020
    0x0b4b0,0x06a50,0x06d40,0x0ab50,0x02b60,0x09570 // 2030
];

const zodiacs = ["Rat", "Ox", "Tiger", "Rabbit", "Dragon", "Snake", "Horse", "Goat", "Monkey", "Rooster", "Dog", "Pig"];
const zd = {
    "Rat": { e: "Water", m: "Creativity", d: "Quick-witted, resourceful, and intelligent." },
    "Ox": { e: "Earth", m: "Stability", d: "Diligent, dependable, and honest." },
    "Tiger": { e: "Wood", m: "Growth", d: "Brave, confident, and adventurous." },
    "Rabbit": { e: "Wood", m: "Growth", d: "Gentle, elegant, and exceptionally refined." },
    "Dragon": { e: "Earth", m: "Stability", d: "Powerful, charismatic, and noble." },
    "Snake": { e: "Fire", m: "Passion", d: "Wise, enigmatic, and deeply intuitive." },
    "Horse": { e: "Fire", m: "Passion", d: "Energetic, free-spirited, and independent." },
    "Goat": { e: "Earth", m: "Stability", d: "Creative, resilient, and peace-loving." },
    "Monkey": { e: "Metal", m: "Ambition", d: "Playful, clever, and full of curiosity." },
    "Rooster": { e: "Metal", m: "Ambition", d: "Hardworking, observant, and courageous." },
    "Dog": { e: "Earth", m: "Stability", d: "Honest, loyal, and fiercely protective." },
    "Pig": { e: "Water", m: "Creativity", d: "Compassionate, generous, and joyful." }
};

function reveal() {
    const val = document.getElementById('dob').value;
    if(!val) return;
    const date = new Date(val);
    const base = new Date(1920, 1, 20);
    let offset = Math.floor((date - base) / 86400000);
    
    let y, m, d, i;
    for (y = 1920; y <= 2035; y++) {
        let days = 348;
        for (i = 0x8000; i > 0x8; i >>= 1) days += (LUNAR_DATA[y-1920] & i) ? 1 : 0;
        if (offset < days) break;
        offset -= days;
    }

    let leap = LUNAR_DATA[y-1920] & 0xf, isL = false;
    for (m = 1; m <= 12; m++) {
        let md = (LUNAR_DATA[y-1920] & (0x10000 >> m)) ? 30 : 29;
        if (offset < md) break;
        offset -= md;
        if (m === leap && !isL) { isL = true; m--; } else if (isL) isL = false;
    }
    d = offset + 1;

    const moons = ["1st Moon", "2nd Moon", "3rd Moon", "4th Moon", "5th Moon", "6th Moon", "7th Moon", "8th Moon", "9th Moon", "10th Moon", "11th Moon", "12th Moon"];
    document.getElementById('res-lunar').innerText = `${moons[m-1]} ${d}, ${y}`;
    
    const animal = zodiacs[(y - 4) % 12];
    const info = zd[animal];
    document.getElementById('res-zodiac').innerText = animal;
    document.getElementById('res-element').innerText = info.e;
    document.getElementById('res-element-meaning').innerText = `(${info.m})`;
    document.getElementById('res-desc').innerText = info.d;
    document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Find Your Chinese Zodiac Sign | NI HAO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #b59b58;
            --bright-gold: #d4bc7d;
            --dark-green: #111d1a;
            --dark-box: #0a1311;
            --text-light: #e0e0e0;
            --border-color: #3a4744;
        }

        body {
            background-color: var(--dark-green);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header { padding: 40px 10px; text-align: center; width: 100%; }

        .logo-container {
            max-width: 500px; margin: 0 auto;
            border-top: 1px solid var(--primary-gold);
            border-bottom: 1px solid var(--primary-gold);
            padding: 20px 0; display: flex; justify-content: center; align-items: center; gap: 15px;
        }

        .logo-text { font-family: 'Cinzel', serif; font-size: 2rem; letter-spacing: 8px; color: var(--primary-gold); margin: 0; }
        .logo-cn { font-size: 1.1rem; color: #5b6e6a; }

        .container {
            width: 92%; max-width: 600px;
            background: var(--dark-box); padding: 45px 25px;
            border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            margin-bottom: 60px; border: 1px solid var(--border-color);
            text-align: center; box-sizing: border-box;
        }

        h1.main-title {
            font-family: 'Cinzel', serif; color: var(--primary-gold);
            font-size: 1.65rem; margin-bottom: 40px; line-height: 2.3; 
        }
        .main-title span { display: block; }

        /* 修正標題與框框間距 */
        .input-group { margin-top: 10px; }
        label {
            display: block; margin-bottom: 25px; 
            font-size: 1.1rem; letter-spacing: 1px; color: #aaa;
        }

        input[type="date"] {
            background: transparent; border: 1px solid var(--border-color);
            color: white; padding: 15px; font-size: 1.1rem;
            width: 100%; max-width: 340px; text-align: center;
            border-radius: 0; font-family: 'Montserrat', sans-serif;
            margin-bottom: 20px;
        }

        .reveal-btn {
            background: var(--primary-gold); color: var(--dark-green);
            border: none; padding: 18px; font-family: 'Cinzel', serif;
            font-weight: bold; letter-spacing: 3px; font-size: 1.1rem;
            cursor: pointer; width: 100%; max-width: 340px; transition: 0.3s;
        }

        #result {
            display: none; margin-top: 50px; border-top: 1px solid var(--border-color);
            padding-top: 45px; text-align: left; animation: fadeIn 0.8s ease;
        }

        .zodiac-img-box {
            text-align: center; margin-bottom: 40px;
        }

        /* 直接使用內嵌路徑的黃金質感圖標 */
        .zodiac-icon {
            width: 150px; height: 150px;
            fill: #d4bc7d; /* 亮金色 */
            filter: drop-shadow(0 0 8px rgba(181, 155, 88, 0.6));
        }

        .result-item { margin-bottom: 25px; }
        .label-gold { color: var(--primary-gold); font-family: 'Cinzel', serif; font-weight: bold; font-size: 0.95rem; display: block; margin-bottom: 8px; }
        .value-text { font-size: 1.25rem; color: #fff; }

        .profile-box {
            background: rgba(181, 155, 88, 0.06); padding: 25px;
            border-left: 4px solid var(--primary-gold); margin-top: 35px;
            line-height: 1.9; font-size: 1.1rem;
        }

        footer {
            width: 100%; padding: 60px 20px; background: #080f0e;
            text-align: center; border-top: 1px solid var(--border-color); box-sizing: border-box;
        }

        .footer-title { color: var(--primary-gold); font-family: 'Cinzel', serif; margin-bottom: 30px; }
        .footer-grid { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .footer-col b { color: var(--primary-gold); display: block; margin-bottom: 10px; font-family: 'Cinzel', serif; }
        .footer-col p { color: #aaa; line-height: 1.8; margin: 0; font-size: 0.9rem; }

        @media (max-width: 600px) {
            .footer-grid { grid-template-columns: 1fr; }
            input[type="date"], .reveal-btn { max-width: 280px; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

    <footer>
        <div class="footer-title">NI HAO RESTAURANT - POOLE</div>
        <div class="footer-grid">
            <div class="footer-col">
                <b>Contact</b>
                <p>TEL: 01202 611622</p>
                <p>EMAIL: hello@ni-hao.life</p>
            </div>
            <div class="footer-col">

        const profiles = {
            "Rat": { element: "Water", spirit: "Vodka - Clean & Versatile", text: "Quick-witted, resourceful, charming, versatile, and intelligent. They are the pioneers of the zodiac. Naturally curious, they are excellent at spotting opportunities where others see obstacles." },
            "Ox": { element: "Earth", spirit: "Dark Rum - Strong & Dependable", text: "Diligent, strong, dependable, determined, and honest. Known for their patience. They possess great endurance and focus, making them the anchor in any storm." },
            "Tiger": { element: "Wood", spirit: "Bourbon - Brave & Bold", text: "Brave, confident, adventurous, powerful, full of vigor, and courageous. A natural leader. Tigers are charismatic and live life with a raw intensity that inspires those around them." },
            "Rabbit": { element: "Wood", spirit: "Gin - Elegant & Refined", text: "Gentle, elegant, patient, exceptionally refined, peaceful and kind. They have a keen eye for beauty. Their diplomatic nature helps them navigate complex social situations with grace." },
            "Dragon": { element: "Earth", spirit: "Champagne - Majestic & Noble", text: "Powerful, charismatic, naturally gifted, ambitious, legendary, noble and the most vital figure in the zodiac. They carry an air of natural authority and boundless energy." },
            "Snake": { element: "Fire", spirit: "Tequila - Wise & Enigmatic", text: "Wise, enigmatic, deeply intuitive, mysterious, graceful, and deep thinkers. They possess a calm exterior but an incredibly sharp and analytical mind." },

            "Goat": { element: "Earth", spirit: "Sake - Creative & Harmonious", text: "Creative, resilient, gentle, peace-loving, mild-mannered, and appreciative of the finer things. Their artistic soul and empathetic nature make them wonderful companions." },
            "Monkey": { element: "Metal", spirit: "White Rum - Playful & Innovative", text: "Playful, clever, innovative, mischievously fun, quick-witted, and full of curiosity. They are master problem solvers who love to entertain." },
            "Rooster": { element: "Metal", spirit: "Scotch - Hardworking & Observant", text: "Hardworking, observant, courageous, punctual, and loves to stand out. They are loyal friends who value honesty and present themselves with great pride." },
            "Dog": { element: "Earth", spirit: "Dry Vermouth - Honest & Reliable", text: "Honest, loyal, kind, faithful, fiercely protective, and reliable. Always ready to help others. Their integrity and sense of justice are unmatched." },
            "Pig": { element: "Water", spirit: "Prosecco - Compassionate & Joyful", text: "Compassionate, generous, happy, easygoing, genuine, and joyful. They bring happiness to everyone. Their heart of gold makes them the most sincere sign of the zodiac." }
        };

        const order = ["Rat", "Ox", "Tiger", "Rabbit", "Dragon", "Snake", "Horse", "Goat", "Monkey", "Rooster", "Dog", "Pig"];

        function getHoro(m, d) {
            const days = [20,19,21,20,21,21,23,23,23,23,22,22];
            const names = ["Capricorn", "Aquarius", "Pisces", "Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn"];
            return d < days[m-1] ? names[m-1] : names[m];
        }

        function revealZodiac() {
            const val = document.getElementById('birthday').value;
            if (!val) return;
            const date = new Date(val);
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            const d = date.getDate();

            let idx = (y - 1924) % 12;
            if (idx < 0) idx += 12;
            if (m < 2 || (m === 2 && d < 10)) idx = (idx - 1 + 12) % 12;

            const sign = order[idx];
            const data = profiles[sign];

            document.getElementById('zodiacIconArea').innerHTML = icons[sign];
            document.getElementById('resZodiac').innerText = sign;
            document.getElementById('resElement').innerText = data.element;
            document.getElementById('resHoro').innerText = getHoro(m, d);
            document.getElementById('resSpirit').innerText = data.spirit;
            document.getElementById('resProfile').innerText = data.text;

            document.getElementById('result').style.display = 'block';
            window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
        }

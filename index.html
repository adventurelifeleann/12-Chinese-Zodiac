function getLunarDate(date) {
    const minTime = Date.UTC(1900, 1, 10);
    let offset = (date.getTime() - minTime) / 86400000 + 1;
    let year, month, day, i, leap = 0;

    for (i = 1900; i < 2049 && offset > 0; i++) {
        let yearDays = getLunarYearDays(i);
        leap = getLeapMonth(i);
        offset -= yearDays;
    }
    if (offset < 0) { offset += yearDays; i--; }
    year = i;

    for (i = 1; i < 13 && offset > 0; i++) {
        let monthDays;
        if (leap > 0 && i === leap + 1) {
            monthDays = getLeapDays(year);
            leap = -leap; 
        } else {
            monthDays = getMonthDays(year, i);
        }
        offset -= monthDays;
    }
    if (offset < 0) { offset += monthDays; i--; }
    month = i;
    day = Math.floor(offset) + 1;
    
    // 如果計算結果月份小於0，修正月份和日期
    if (month < 1) { month += 12; day = monthDays + offset + 1; }

    // 將漢字月日轉換為外國人理解的 Month 和 Day
    const monthNames = ["Month 1", "Month 2", "Month 3", "Month 4", "Month 5", "Month 6", "Month 7", "Month 8", "Month 9", "Month 10", "Month 11", "Month 12"];
    return `${monthNames[month - 1]}, Day ${day} (in the Year of the ${animals[(year - 4) % 12]})`;

function getLunarYearDays(year) {
    let sum = 0;
    for (let i = 0x8000; i > 0x8; i >>= 1) { sum += (LUNAR_INFO[year - 1900] & i) ? 30 : 29; }
    return sum + getLeapDays(year);
}
function getMonthDays(year, month) { return (LUNAR_INFO[year - 1900] & (0x10000 >> month)) ? 30 : 29; }
function getLeapDays(year) { return getLeapMonth(year) ? (LUNAR_LEAP[year - 1900] & 0x10000) ? 30 : 29 : 0; }

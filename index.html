<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Find Your Chinese Zodiac Sign | NI HAO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #b59b58;
            --dark-green: #111d1a;
            --dark-box: #0a1311;
            --text-light: #e0e0e0;
            --border-color: #3a4744;
        }

        body {
            background-color: var(--dark-green);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Logo 橫向排列修正 */
        header {
            padding: 40px 10px;
            text-align: center;
            width: 100%;
        }

        .logo-container {
            max-width: 90%;
            margin: 0 auto;
            border-top: 1px solid var(--primary-gold);
            border-bottom: 1px solid var(--primary-gold);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            letter-spacing: 6px;
            color: var(--primary-gold);
            margin: 0;
        }

        .logo-cn {
            font-size: 1rem;
            color: #5b6e6a;
            white-space: nowrap;
        }

        .container {
            width: 85%;
            max-width: 500px;
            background: var(--dark-box);
            padding: 30px 20px;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            margin-bottom: 50px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        /* 標題強制兩行修正 (問題1) */
        h1.main-title {
            font-family: 'Cinzel', serif;
            color: var(--primary-gold);
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        
        .main-title span {
            display: block; /* 讓內容強制分開兩行 */
        }

        label {
            display: block;
            margin-bottom: 15px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #aaa;
        }

        input[type="date"] {
            background: transparent;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            font-size: 1.1rem;
            width: 100%;
            max-width: 280px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
            border-radius: 0;
        }

        .reveal-btn {
            background: var(--primary-gold);
            color: var(--dark-green);
            border: none;
            padding: 15px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            letter-spacing: 3px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            transition: 0.3s;
        }

        /* 結果區域 */
        #result {
            display: none;
            margin-top: 35px;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
            text-align: left;
        }

        .result-item { margin-bottom: 20px; }

        .label-gold {
            color: var(--primary-gold);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 5px;
        }

        .value-text { font-size: 1.1rem; font-weight: 400; }

        .profile-box {
            background: rgba(181, 155, 88, 0.08);
            padding: 20px;
            border-left: 3px solid var(--primary-gold);
            margin-top: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        footer {
            width: 100%;
            padding: 40px 0;
            background: #080f0e;
            text-align: center;
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
        }

        .footer-title { color: var(--primary-gold); font-family: 'Cinzel', serif; margin-bottom: 15px; }
        .footer-info { line-height: 2; color: #888; padding: 0 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1 class="logo-text">NI</h1>
            <span class="logo-cn">你好</span>
            <h1 class="logo-text">HAO</h1>
        </div>
    </header>

    <div class="container">
        <h1 class="main-title">
            <span>Discover Your</span>
            <span>Chinese Zodiac Sign</span>
        </h1>
        
        <div class="input-group">
            <label>Select Your Birthday</label>
            <input type="date" id="birthday">
            <br>
            <button onclick="revealZodiac()" class="reveal-btn">REVEAL</button>
        </div>

        <div id="result">
            <div class="result-item">
                <span class="label-gold">Zodiac Spirit Pairing</span>
                <span id="resSpirit" class="value-text"></span>
            </div>
            <div class="result-item">
                <span class="label-gold">Zodiac Sign</span>
                <span id="resZodiac" class="value-text"></span>
            </div>
            <div class="result-item">
                <span class="label-gold">Five Elements</span>
                <span id="resElement" class="value-text"></span>
            </div>
            <div class="result-item">
                <span class="label-gold">Horoscope</span>
                <span id="resHoro" class="value-text"></span>
            </div>
            <div class="profile-box">
                <span class="label-gold">Personality Profile</span>
                <span id="resProfile"></span>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-title">NI HAO RESTAURANT - POOLE</div>
        <div class="footer-info">
            <b>Contact</b><br>
            TEL: 01202 611622 | hello@ni-hao.life<br>
            <b>Location</b><br>
            89 Commercial Road, Poole, Dorset BH14 0JD
        </div>
    </footer>

    <script>
        const zodiacData = {
            "Rat": { element: "Water (Creativity)", spirit: "Vodka - Clean & Versatile", text: "Quick-witted, resourceful, charming, versatile, and intelligent. They are the pioneers of the zodiac. Naturally curious, they are excellent at spotting opportunities where others see obstacles." },
            "Ox": { element: "Earth (Stability)", spirit: "Dark Rum - Strong & Dependable", text: "Diligent, strong, dependable, determined, and honest. Known for their patience. They possess great endurance and focus, making them the anchor in any storm." },
            "Tiger": { element: "Wood (Growth)", spirit: "Bourbon - Brave & Bold", text: "Brave, confident, adventurous, powerful, full of vigor, and courageous. A natural leader. Tigers are charismatic and live life with a raw intensity that inspires those around them." },
            "Rabbit": { element: "Wood (Growth)", spirit: "Gin - Elegant & Refined", text: "Gentle, elegant, patient, exceptionally refined, peaceful and kind. They have a keen eye for beauty. Their diplomatic nature helps them navigate complex social situations with grace." },
            "Dragon": { element: "Earth (Stability)", spirit: "Champagne - Majestic & Noble", text: "Powerful, charismatic, naturally gifted, ambitious, legendary, noble and the most vital figure in the zodiac. They carry an air of natural authority and boundless energy." },
            "Snake": { element: "Fire (Passion)", spirit: "Tequila - Wise & Enigmatic", text: "Wise, enigmatic, deeply intuitive, mysterious, graceful, and deep thinkers. They possess a calm exterior but an incredibly sharp and analytical mind." },
            "Horse": { element: "Fire (Passion)", spirit: "Cognac - Energetic & Free-spirited", text: "Energetic, free-spirited, independent, and always chasing progress. They are the life of the party and thrive on freedom and open spaces." },
            "Goat": { element: "Earth (Stability)", spirit: "Sake - Creative & Harmonious", text: "Creative, resilient, gentle, peace-loving, mild-mannered, and appreciative of the finer things. Their artistic soul and empathetic nature make them wonderful companions." },
            "Monkey": { element: "Metal (Ambition)", spirit: "White Rum - Playful & Innovative", text: "Playful, clever, innovative, mischievously fun, quick-witted, and full of curiosity. They are master problem solvers who love to entertain." },
            "Rooster": { element: "Metal (Ambition)", spirit: "Scotch - Hardworking & Observant", text: "Hardworking, observant, courageous, punctual, and loves to stand out. They are loyal friends who value honesty and present themselves with great pride." },
            "Dog": { element: "Earth (Stability)", spirit: "Dry Vermouth - Honest & Reliable", text: "Honest, loyal, kind, faithful, fiercely protective, and reliable. Always ready to help others. Their integrity and sense of justice are unmatched." },
            "Pig": { element: "Water (Creativity)", spirit: "Prosecco - Compassionate & Joyful", text: "Compassionate, generous, happy, easygoing, genuine, and joyful. They bring happiness to everyone. Their heart of gold makes them the most sincere sign of the zodiac." }
        };

        const order = ["Rat", "Ox", "Tiger", "Rabbit", "Dragon", "Snake", "Horse", "Goat", "Monkey", "Rooster", "Dog", "Pig"];

        function getHoro(m, d) {
            const days = [20,19,21,20,21,21,23,23,23,23,22,22];
            const names = ["Capricorn", "Aquarius", "Pisces", "Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn"];
            return d < days[m-1] ? names[m-1] : names[m];
        }

        function revealZodiac() {
            const val = document.getElementById('birthday').value;
            if (!val) return;
            
            const date = new Date(val);
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            const d = date.getDate();

            // 精簡生肖算法 (1924為鼠年)
            let idx = (y - 1924) % 12;
            if (idx < 0) idx += 12;
            
            // 春節前出生微調
            if (m < 2 || (m === 2 && d < 10)) {
                idx = (idx - 1 + 12) % 12;
            }

            const sign = order[idx];
            const data = zodiacData[sign];

            document.getElementById('resZodiac').innerText = sign;
            document.getElementById('resSpirit').innerText = data.spirit;
            document.getElementById('resElement').innerText = data.element;
            document.getElementById('resHoro').innerText = getHoro(m, d);
            document.getElementById('resProfile').innerText = data.text;

            document.getElementById('result').style.display = 'block';
            window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
        }
    </script>
</body>
</html>

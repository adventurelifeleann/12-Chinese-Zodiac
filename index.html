<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ni Hao | Zodiac Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #111111; --text: #ffffff; --gray: #888888; --hanzi: #4d4d4d; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; }
        .wrapper { max-width: 500px; margin: 40px auto; border: 1px solid rgba(197, 160, 89, 0.3); padding: 40px 20px; text-align: center; }

        /* Logo 修正：確保手機端不拆行 */
        .logo-container { display: flex; justify-content: center; align-items: center; white-space: nowrap; margin-bottom: 10px; }
        .logo-word { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold); letter-spacing: 4px; display: inline-block; }
        .logo-divider { width: 1.5px; height: 30px; background-color: var(--gold); margin: 0 15px; }
        .logo-hanzi { font-size: 20px; color: var(--hanzi); font-family: serif; }
        .tagline { font-size: 12px; color: var(--gray); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }

        /* 全英文選單 */
        .input-box { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; }
        select { background: transparent; border: none; border-bottom: 1px solid var(--gold); color: #fff; padding: 8px; font-size: 16px; outline: none; flex: 1; -webkit-appearance: none; text-align: center; }

        button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 15px 40px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background: var(--gold); color: #000; }

        #result { display: none; margin-top: 50px; text-align: left; border-top: 1px solid rgba(197, 160, 89, 0.2); padding-top: 30px; }
        .res-item { margin-bottom: 25px; }
        .res-label { color: var(--gold); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .res-val { font-family: 'Playfair Display', serif; font-size: 22px; }
        .res-desc { font-size: 15px; color: #ccc; line-height: 1.8; margin-top: 10px; }

        /* 底部資訊排版 */
        .footer { margin-top: 50px; border-top: 1px solid rgba(197, 160, 89, 0.1); padding-top: 30px; display: flex; justify-content: space-between; text-align: left; font-size: 11px; color: var(--gray); line-height: 1.6; }
        .footer strong { color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 5px; }
        @media (max-width: 400px) { .footer { flex-direction: column; gap: 20px; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="logo-container">
        <div class="logo-word">NI</div>
        <div class="logo-divider"></div>
        <div class="logo-hanzi">你好</div>
        <div class="logo-divider"></div>
        <div class="logo-word">HAO</div>
    </div>
    <div class="tagline">Zodiac & Destiny</div>

    <div class="input-box">
        <select id="day"><option value="" disabled selected>Day</option></select>
        <select id="month"><option value="" disabled selected>Month</option></select>
        <select id="year"><option value="" disabled selected>Year</option></select>
    </div>
    <button onclick="calculate()">Discover</button>

    <div id="result">
        <div class="res-item"><span class="res-label">Lunar Birthday</span><span id="l-date" class="res-val"></span></div>
        <div class="res-item"><span class="res-label">Chinese Zodiac</span><span id="l-zodiac" class="res-val"></span></div>
        <div class="res-item"><span class="res-label">Five Elements</span><span id="l-element" class="res-val"></span></div>
        <div class="res-item"><span class="res-label">Personality Profile</span><p id="l-desc" class="res-desc"></p></div>

        <div class="footer">
            <div><strong>Location</strong>89 Commercial Road,<br>Poole, Dorset BH14 0JD</div>
            <div><strong>Contact</strong>TEL 01202 611622<br>hello@ni-hao.life</div>
        </div>
    </div>
</div>

<script>
// 初始化英文選單
const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const dSel = document.getElementById('day'), mSel = document.getElementById('month'), ySel = document.getElementById('year');
for(let i=1; i<=31; i++) dSel.options.add(new Option(i, i));
months.forEach((m, i) => mSel.options.add(new Option(m, i+1)));
for(let i=2030; i>=1930; i--) ySel.options.add(new Option(i, i));

// 1930-2030 農曆數據庫 (核心算法優化)
const LUNAR_TABLE = [
    0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
    0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
    0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
    0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0a950,
    0x0d4a0,0x1d8a6,0x0da50,0x07550,0x156a4,0x0abb0,0x025d0,0x092d0,0x0cab5,0x0a950,
    0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x0a930,0x07c80,0x14ae5,
    0x04f60,0x0a560,0x0a564,0x0a4d0,0x0d150,0x0d925,0x0d520,0x0daa0,0x15b64,0x056d0,
    0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
    0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
    0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0a950,0x0d4a0
];

const zodiacs = ["Rat","Ox","Tiger","Rabbit","Dragon","Snake","Horse","Goat","Monkey","Rooster","Dog","Pig"];
const profiles = {
    "Rat": { e: "Water", d: "Quick-witted, resourceful, charming, versatile, and intelligent. They are the pioneers of the zodiac." },
    "Ox": { e: "Earth", d: "Diligent, strong, dependable, determined, and honest. Known for their patience." },
    "Tiger": { e: "Wood", d: "Brave, confident, adventurous, powerful, full of vigor, and courageous. A natural leader." },
    "Rabbit": { e: "Wood", d: "Gentle, elegant, patient, exceptionally refined, peaceful and kind. They have a keen eye for beauty." },
    "Dragon": { e: "Earth", d: "Powerful, charismatic, naturally gifted, ambitious, legendary, noble and the most vital figure in the zodiac." },
    "Snake": { e: "Fire", d: "Wise, enigmatic, deeply intuitive, mysterious, graceful, and deep thinkers." },
    "Horse": { e: "Fire", d: "Energetic, free-spirited, independent, and always chasing progress." },
    "Goat": { e: "Earth", d: "Creative, resilient, gentle, peace-loving, mild-mannered, and appreciative of the finer things." },
    "Monkey": { e: "Metal", d: "Playful, clever, innovative, mischievously fun, quick-witted, and full of curiosity." },
    "Rooster": { e: "Metal", d: "Hardworking, observant, courageous, punctual, and loves to stand out." },
    "Dog": { e: "Earth", d: "Honest, loyal, kind, faithful, fiercely protective, and reliable. Always ready to help others." },
    "Pig": { e: "Water", d: "Compassionate, generous, happy, easygoing, genuine, and joyful. They bring happiness to everyone." }
};

function calculate() {
    const y = parseInt(ySel.value), m = parseInt(mSel.value), d = parseInt(dSel.value);
    if(!y || !m || !d) return;

    const date = new Date(y, m-1, d);
    const offset = Math.floor((date - new Date(1900,0,31))/86400000);
    
    let temp = offset, i, yearDays;
    for(i=1900; i<2050 && temp>0; i++) {
        yearDays = 348;
        for(let j=0x8000; j>0x8; j>>=1) yearDays += (LUNAR_TABLE[i-1900] & j) ? 1 : 0;
        let leap = LUNAR_TABLE[i-1900] & 0xf;
        if(leap) yearDays += (LUNAR_TABLE[i-1900] & 0x10000) ? 30 : 29;
        if(temp < yearDays) break;
        temp -= yearDays;
    }

    const lunarYear = i;
    const zIdx = (lunarYear - 4) % 12;
    const zName = zodiacs[zIdx];
    const info = profiles[zName];

    document.getElementById('l-date').innerText = `Moon Cycle Year ${lunarYear}`;
    document.getElementById('l-zodiac').innerText = zName;
    document.getElementById('l-element').innerText = info.e;
    document.getElementById('l-desc').innerText = info.d;
    document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>

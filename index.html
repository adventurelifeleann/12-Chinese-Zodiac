<script>
// --- 純英文日期選單生成與初始化 ---

    const yearSelect = document.getElementById('dob-year');

    0x0d4a0, 0x0da50, 0x07550, 0x056a0, 0x0abb0, 0x025d0, 0x092d0, 0x0cab0, 0x0a950, 0x0b4a0,
    0x0baa0, 0x0ad50, 0x055d0, 0x04ba0, 0x0a5b0, 0x05170, 0x0a930, 0x07c80, 0x06aa0, 0x0ad50,
    0x04ae0, 0x0a560, 0x0a4d0, 0x0d260, 0x0d950, 0x05aa0, 0x056a0, 0x096d0, 0x04ae0, 0x0a4d0,
    0x0d250, 0x0d4a0, 0x0da50, 0x05aa0, 0x056a0, 0x0a9d0, 0x052d0, 0x0a950, 0x0b4a0, 0x0b550,
    0x0ad50, 0x055a0, 0x04ba0, 0x0a5b0, 0x052b0, 0x0a930, 0x074a0, 0x06950, 0x0ad50, 0x04ae0,
    0x0a4e0, 0x0a4d0, 0x0d250, 0x0d920, 0x0d550, 0x05aa0, 0x0ada0, 0x095d0, 0x04970, 0x0a4b0,
    0x0b4b0, 0x06a50, 0x06d40, 0x0ab50, 0x02b60, 0x09570
];

// 數據與之前版本一致 (包含 1920-2035 農曆數據)
const animals = ["Rat", "Ox", "Tiger", "Rabbit", "Dragon", "Snake", "Horse", "Goat", "Monkey", "Rooster", "Dog", "Pig"];
const zodiacData = {

};

function getLunar(date) {
    const minDate = new Date(1900, 1, 31);
    let offset = Math.floor((date.getTime() - minDate.getTime()) / 86400000);
    
    let year, month, day;
    for (year = 1900; year <= 2049; year++) {
        let yearDays = 348;
        for (let i = 0x8000; i > 0x8; i >>= 1) yearDays += (LUNAR_INFO[year-1900] & i) ? 1 : 0;
        let leapMonth = LUNAR_INFO[year-1900] & 0xf;
        let leapDays = 0;
        if(leapMonth) leapDays = (LUNAR_INFO[year-1900] & 0x10000) ? 30 : 29;
        let totalYearDays = yearDays + leapDays;

        if (offset < totalYearDays) break;
        offset -= totalYearDays;
    }

    let leapMonth = LUNAR_INFO[year-1900] & 0xf;
    let isLeap = false;
    for (month = 1; month <= 12; month++) {
        let mDays = (LUNAR_INFO[year-1900] & (0x10000 >> month)) ? 30 : 29;
        if (offset < mDays) break;
        offset -= mDays;

        if (month === leapMonth && !isLeap) {
            isLeap = true; month--; 
        } else if (isLeap) { isLeap = false; }
    }
    day = offset + 1;
    return { y: year, m: month, d: day };
}

function revealDestiny() {
    const day = document.getElementById('dob-day').value;
    const month = document.getElementById('dob-month').value;
    const year = document.getElementById('dob-year').value;
    if(!day || !month || !year) return;
    
    const d = new Date(year, month-1, day);
    const lunar = getLunar(d);

    const monthNames = ["1st Moon", "2nd Moon", "3rd Moon", "4th Moon", "5th Moon", "6th Moon", "7th Moon", "8th Moon", "9th Moon", "10th Moon", "11th Moon", "12th Moon"];
    document.getElementById('res-lunar').innerText = `${monthNames[lunar.m-1]}, Day ${lunar.d} (${lunar.y})`;

    const key = animals[(lunar.y - 4) % 12];
    const info = zodiacData[key];

    document.getElementById('res-zodiac').innerText = `${info.emoji} ${info.title}`;
    document.getElementById('res-element').innerText = info.element;
    document.getElementById('res-element-meaning').innerText = `(${info.meaning})`;
    
    const signs = ["Capricorn", "Aquarius", "Pisces", "Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius"];
    const dates = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22];
    document.getElementById('res-star').innerText = (d.getDate() >= dates[d.getMonth()]) ? signs[(d.getMonth()+1)%12] : signs[d.getMonth()];
    
    document.getElementById('res-desc').innerText = info.desc;
    document.getElementById('result').style.display = 'block';
}
